<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syifaa Linktree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell" aria-label="Personal links">
    <article class="linktree-card">
      <header class="hero">
        <img src="assets/images/hero-sky.svg" alt="Blue sky and modern building" class="hero__image">
        <h1 class="hero__title">Syifaa<br>Linktree</h1>
      </header>

      <section class="contact-grid" aria-label="Contact actions">
        <a class="contact-card" href="tel:+60123456789">
          <span aria-hidden="true">📱</span>
          <span>Contact</span>
        </a>
        <a class="contact-card" href="mailto:hello@example.com">
          <span aria-hidden="true">✉️</span>
          <span>Email</span>
        </a>
      </section>

      <nav class="links" aria-label="Social and portfolio links">
        <a class="link-card" href="https://instagram.com" target="_blank" rel="noreferrer">
          <span class="link-card__icon" aria-hidden="true">📷</span>
          <span>Instagram</span>
        </a>
        <a class="link-card" href="https://tiktok.com" target="_blank" rel="noreferrer">
          <span class="link-card__icon" aria-hidden="true">🎵</span>
          <span>TikTok</span>
        </a>
        <a class="link-card" href="#portfolio">
          <span class="link-card__icon" aria-hidden="true">✏️</span>
          <span>Portfolio</span>
        </a>
        <a class="link-card" href="https://linkedin.com" target="_blank" rel="noreferrer">
          <span class="link-card__icon" aria-hidden="true">💼</span>
          <span>LinkedIn</span>
        </a>
        <a class="link-card" href="#website">
          <span class="link-card__icon" aria-hidden="true">👩‍💻</span>
          <span>Website</span>
        </a>
        <a class="link-card" href="https://spotify.com" target="_blank" rel="noreferrer">
          <span class="link-card__icon" aria-hidden="true">🌻</span>
          <span>Spotify</span>
        </a>
      </nav>

      <footer class="site-footer">
        <p>Made with calm clicks.</p>
      </footer>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
